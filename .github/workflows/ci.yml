# Основной CI pipeline Brand Platform (INSIGHTS §5 — SAST + gitleaks + tsc/build).
# Блокирует merge в main при: TS-ошибке, semgrep findings ≥ MEDIUM, gitleaks positive.
name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- TypeScript ----
  backend-tsc:
    name: backend · tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: backend

  backend-build:
    name: backend · build
    runs-on: ubuntu-latest
    needs: backend-tsc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run build
        working-directory: backend
      - name: Assert dist/main.js
        run: ls backend/dist/main.js

  frontend-tsc:
    name: frontend · tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  frontend-build:
    name: frontend · build
    runs-on: ubuntu-latest
    needs: frontend-tsc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Assert dist/index.html
        run: ls frontend/dist/index.html

  docx-exporter-tsc:
    name: docx-exporter · tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docx-exporter/package-lock.json
      - run: npm ci
        working-directory: docx-exporter
      - run: npx tsc --noEmit
        working-directory: docx-exporter

  # ---- Security (INSIGHTS §5) ----
  semgrep-sast:
    name: security · semgrep SAST (blocks ≥ MEDIUM)
    runs-on: ubuntu-latest
    # Semgrep community edition бесплатный на open-source и маленькие команды.
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run semgrep
        run: |
          semgrep scan \
            --config=ci/semgrep.yml \
            --config=p/owasp-top-ten \
            --config=p/nodejsscan \
            --config=p/typescript \
            --config=p/react \
            --severity=ERROR \
            --severity=WARNING \
            --error \
            --metrics=off \
            --sarif --output=semgrep.sarif
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  gitleaks-scan:
    name: security · gitleaks (secrets in git)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---- Финальный gate ----
  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs:
      - backend-tsc
      - backend-build
      - frontend-tsc
      - frontend-build
      - docx-exporter-tsc
      - semgrep-sast
      - gitleaks-scan
    steps:
      - run: echo "All required checks passed."
