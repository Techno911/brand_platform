# OWASP ZAP DAST baseline (INSIGHTS §5: SAST + DAST в CI).
# Запускается вручную на staging-домен или по расписанию раз в неделю.
name: zap-baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL staging-развёртывания BP (https://staging.chirkov-bp.ru)"
        required: true
        default: "https://staging.chirkov-bp.ru"
  schedule:
    # Воскресенье 04:00 UTC = 07:00 MSK
    - cron: "0 4 * * 0"

jobs:
  zap_baseline:
    name: ZAP baseline · ${{ github.event.inputs.target_url || 'staging' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://staging.chirkov-bp.ru' }}
          rules_file_name: ci/zap-rules.tsv
          cmd_options: "-a -T 10"
          fail_action: true
          artifact_name: zap-baseline-report
