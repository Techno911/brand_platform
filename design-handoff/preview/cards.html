<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="row" style="gap:14px;align-items:stretch">
  <div style="width:240px;background:#fff;border:1px solid #E7E5E4;border-radius:20px;padding:20px">
    <div style="font-size:16px;font-weight:600;color:#1A1A1A">Активные проекты</div>
    <div style="font-size:13px;color:#78716C;margin-top:4px">default — border only</div>
  </div>
  <div style="width:240px;background:#fff;border:1px solid #E7E5E4;border-radius:20px;padding:20px;box-shadow:0 4px 12px 0 rgba(0,0,0,0.06)">
    <div style="font-size:16px;font-weight:600;color:#1A1A1A">Бюджет проектов</div>
    <div style="font-size:13px;color:#78716C;margin-top:4px">elevated — soft-2 shadow</div>
  </div>
  <div style="width:240px;background:#fff;border:1px solid #A5B4FC;border-radius:20px;padding:20px;box-shadow:0 4px 12px 0 rgba(79,70,229,0.08)">
    <div style="font-size:16px;font-weight:600;color:#1A1A1A">Стоматология №1</div>
    <div style="font-size:13px;color:#78716C;margin-top:4px">interactive — hover state</div>
  </div>
</div>
<p class="meta" style="margin-top:12px">Radius 20px. 3 variants: default (border, no shadow), elevated (+ soft-2), interactive (hover: indigo-300 border + indigo-tinted shadow at 8%).</p>
</body></html>
