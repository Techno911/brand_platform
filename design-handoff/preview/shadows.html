<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="row" style="gap:16px">
  <div class="stack" style="gap:6px"><div style="width:160px;height:80px;background:#fff;border:1px solid #E7E5E4;border-radius:16px"></div><div class="meta">default · border only</div></div>
  <div class="stack" style="gap:6px"><div style="width:160px;height:80px;background:#fff;border-radius:16px;box-shadow:0 1px 2px 0 rgba(0,0,0,0.05)"></div><div class="meta">soft-1 · 1px 2px /.05</div></div>
  <div class="stack" style="gap:6px"><div style="width:160px;height:80px;background:#fff;border-radius:16px;box-shadow:0 4px 12px 0 rgba(0,0,0,0.06)"></div><div class="meta">soft-2 · elevated card</div></div>
  <div class="stack" style="gap:6px"><div style="width:160px;height:80px;background:#fff;border-radius:16px;box-shadow:0 12px 40px 0 rgba(0,0,0,0.15)"></div><div class="meta">overlay · modal / dropdown</div></div>
  <div class="stack" style="gap:6px"><div style="width:160px;height:80px;background:#fff;border:1px solid #4F46E5;border-radius:16px;box-shadow:0 0 0 3px rgba(79,70,229,0.25)"></div><div class="meta">focus · indigo 3px ring</div></div>
</div>
<p class="meta" style="margin-top:12px">Default cards use border, no shadow. Shadow is an intentional elevation, never sprinkled. No colored shadows.</p>
</body></html>
