<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="background:#1A1A1A;border-radius:20px;padding:20px 16px;color:#fff;max-width:240px">
  <div style="display:flex;align-items:center;gap:12px;min-height:40px;margin-bottom:16px">
    <img src="../assets/logo-full-dark.png" alt="" style="height:28px" class="logo-invert">
  </div>
  <div style="display:flex;flex-direction:column;gap:4px">
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:#4F46E5;color:#fff;font-size:14px;font-weight:500"><div style="width:16px;height:16px;background:rgba(255,255,255,0.25);border-radius:3px"></div>Главная</div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;color:#9CA3AF;font-size:14px"><div style="width:16px;height:16px;background:#333;border-radius:3px"></div>Проекты</div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:#2A2A2A;color:#fff;font-size:14px"><div style="width:16px;height:16px;background:#444;border-radius:3px"></div>hover state</div>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#57534E;padding:10px 12px;margin-top:16px">Администрирование</div>
  <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;color:#9CA3AF;font-size:14px"><div style="width:16px;height:16px;background:#333;border-radius:3px"></div>Silent failures</div>
</div>
<p class="meta" style="margin-top:12px">Fixed 240px / 64px. Bg #1A1A1A. Active = indigo-500 filled + white, radius 12. Hover = #2A2A2A. Admin group under a thin #292524 divider.</p>
</body></html>
