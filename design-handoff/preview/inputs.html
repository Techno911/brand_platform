<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="stack" style="gap:12px;max-width:420px">
  <div>
    <label style="font-size:14px;font-weight:500;display:block;margin-bottom:6px;color:#1A1A1A">Email</label>
    <input class="input" placeholder="email@example.com">
  </div>
  <div>
    <label style="font-size:14px;font-weight:500;display:block;margin-bottom:6px;color:#1A1A1A">Пароль (focus)</label>
    <input class="input input-focus" value="">
  </div>
  <div>
    <label style="font-size:14px;font-weight:500;display:block;margin-bottom:6px;color:#1A1A1A">Подтвердите (error)</label>
    <input class="input input-error" value="не совпадает">
    <p style="font-size:12px;color:#DC2626;margin-top:6px">Пароли не совпадают</p>
  </div>
</div>
<p class="meta" style="margin-top:12px">Inputs: bg #F5F5F4 → bg #FFFFFF on focus (the bg flip is the felt interaction). Border + 1px indigo ring on focus. Red-500 on error.</p>
</body></html>
