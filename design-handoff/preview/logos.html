<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="row" style="gap:24px;align-items:center;background:#1A1A1A;padding:24px;border-radius:20px">
  <img src="../assets/logo-full-dark.png" alt="logo-full" style="height:44px" class="logo-invert">
  <img src="../assets/logo-emblem-light.png" alt="emblem-light" style="height:44px">
  <img src="../assets/logo-icon-outline.png" alt="icon-outline" style="height:44px">
</div>
<div class="row" style="gap:24px;align-items:center;margin-top:10px;padding:16px;background:#FAFAF9;border:1px solid #E7E5E4;border-radius:16px">
  <img src="../assets/logo-emblem-dark.png" alt="emblem-dark" style="height:40px">
  <img src="../assets/logo-icon-dark.png" alt="icon-dark" style="height:40px">
  <img src="../assets/favicon.png" alt="favicon" style="height:32px;width:32px">
</div>
<p class="meta" style="margin-top:10px">Brandbook PNGs from <code>assets/</code>. On dark fields apply <code>.logo-invert</code> = <code>filter: invert(1) brightness(1.15)</code>. Never redraw as SVG.</p>
</body></html>
