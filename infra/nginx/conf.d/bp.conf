# Brand Platform ingress nginx (INSIGHTS §5 delta-3).
# TLS 1.3 на внешнем порту. Client mTLS — только между backend и docx-exporter
# (в docker-compose через internal network).
#
# На проде: замените server_name на реальный домен, положите сертификаты Let's Encrypt
# в /etc/nginx/certs (host-mount: ./infra/nginx/certs).

# --- HTTP → HTTPS redirect ---
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- HTTPS (TLS 1.3 only) ---
server {
    listen 443 ssl;
    http2 on;
    server_name bp.local chirkov-bp.ru;

    # Сертификат (prod: Let's Encrypt через certbot; local: self-signed)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Только TLS 1.3 — никаких 1.2/1.1/1.0
    ssl_protocols TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — принудительный HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Ограничение тела запроса (INSIGHTS §5 — ограничение PII-вставок + DoS)
    client_max_body_size 8m;

    # Rate limit (INSIGHTS §5: злоупотребление маркетологом)
    limit_req_zone $binary_remote_addr zone=bp_api:10m rate=30r/s;

    # API
    location /api/ {
        limit_req zone=bp_api burst=60 nodelay;
        proxy_pass http://bp-backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Metrics — ТОЛЬКО изнутри сети
    location /metrics {
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://bp-backend:3000/metrics;
    }

    # Frontend static
    location / {
        proxy_pass http://bp-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
